<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WebQuiz</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0f172a;
      --bg2:       #1e293b;
      --bg3:       #334155;
      --accent:    #38bdf8;
      --accent-h:  #0ea5e9;
      --text:      #f1f5f9;
      --muted:     #94a3b8;
      --danger:    #ef4444;
      --success:   #22c55e;
      --radius-card: 12px;
      --radius:    8px;
    }

    html, body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      min-height: 100vh;
    }

    /* ── NAV ── */
    #navbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      height: 56px;
      background: var(--bg2);
      border-bottom: 1px solid var(--bg3);
      position: sticky;
      top: 0;
      z-index: 100;
    }
    #navbar .brand {
      font-size: 1.2rem;
      font-weight: 700;
      color: var(--accent);
      text-decoration: none;
      letter-spacing: .5px;
    }
    #navbar .nav-right {
      display: flex;
      gap: 12px;
      align-items: center;
    }
    #navbar button, #navbar a.nav-link {
      background: transparent;
      border: 1px solid var(--bg3);
      color: var(--muted);
      padding: 6px 14px;
      border-radius: var(--radius);
      cursor: pointer;
      font-size: .85rem;
      text-decoration: none;
      transition: color .15s, border-color .15s;
    }
    #navbar button:hover, #navbar a.nav-link:hover {
      color: var(--text);
      border-color: var(--accent);
    }

    /* ── MAIN CONTENT ── */
    #app {
      max-width: 1100px;
      margin: 0 auto;
      padding: 32px 20px 64px;
    }

    /* ── CARDS ── */
    .card {
      background: var(--bg2);
      border: 1px solid var(--bg3);
      border-radius: var(--radius-card);
      padding: 28px;
      margin-bottom: 20px;
    }
    .card h2 {
      font-size: 1.2rem;
      font-weight: 600;
      margin-bottom: 18px;
      color: var(--text);
    }

    /* ── FORMS ── */
    .form-group { margin-bottom: 16px; }
    .form-group label {
      display: block;
      font-size: .85rem;
      color: var(--muted);
      margin-bottom: 6px;
    }
    .form-group input, .form-group textarea, .form-group select {
      width: 100%;
      background: var(--bg3);
      border: 1px solid #475569;
      color: var(--text);
      padding: 10px 14px;
      border-radius: var(--radius);
      font-size: 1rem;
      outline: none;
      transition: border-color .15s;
    }
    .form-group input:focus,
    .form-group textarea:focus,
    .form-group select:focus {
      border-color: var(--accent);
    }
    .form-group textarea { resize: vertical; min-height: 80px; }

    /* ── BUTTONS ── */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 10px 20px;
      border-radius: var(--radius);
      border: none;
      cursor: pointer;
      font-size: .95rem;
      font-weight: 500;
      transition: background .15s, opacity .15s;
    }
    .btn:disabled { opacity: .5; cursor: not-allowed; }
    .btn-primary  { background: var(--accent);  color: #0f172a; }
    .btn-primary:hover:not(:disabled) { background: var(--accent-h); }
    .btn-secondary { background: var(--bg3); color: var(--text); }
    .btn-secondary:hover:not(:disabled) { background: #475569; }
    .btn-danger   { background: var(--danger); color: #fff; }
    .btn-danger:hover:not(:disabled) { background: #dc2626; }
    .btn-success  { background: var(--success); color: #fff; }
    .btn-success:hover:not(:disabled) { background: #16a34a; }
    .btn-outline  { background: transparent; border: 1px solid var(--bg3); color: var(--text); }
    .btn-outline:hover:not(:disabled) { border-color: var(--accent); color: var(--accent); }
    .btn-sm { padding: 6px 14px; font-size: .85rem; }

    /* ── TOAST ── */
    #toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      z-index: 9999;
      display: flex;
      flex-direction: column;
      gap: 8px;
      pointer-events: none;
    }
    .toast-item {
      background: var(--bg2);
      border: 1px solid var(--bg3);
      border-left: 4px solid var(--accent);
      color: var(--text);
      padding: 12px 18px;
      border-radius: var(--radius);
      font-size: .9rem;
      max-width: 320px;
      box-shadow: 0 4px 20px rgba(0,0,0,.4);
      animation: toastIn .25s ease;
      pointer-events: all;
    }
    .toast-item.error  { border-left-color: var(--danger); }
    .toast-item.success { border-left-color: var(--success); }
    @keyframes toastIn {
      from { opacity: 0; transform: translateX(20px); }
      to   { opacity: 1; transform: translateX(0); }
    }

    /* ── SPINNER ── */
    .spinner {
      display: inline-block;
      width: 20px; height: 20px;
      border: 3px solid var(--bg3);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin .7s linear infinite;
      vertical-align: middle;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── PROGRESS BAR ── */
    .progress-wrap {
      background: var(--bg3);
      border-radius: 99px;
      height: 6px;
      overflow: hidden;
      margin-bottom: 20px;
    }
    .progress-bar {
      height: 100%;
      background: var(--accent);
      border-radius: 99px;
      transition: width .3s ease;
    }

    /* ── LIVE DOT ── */
    .live-dot {
      display: inline-block;
      width: 10px; height: 10px;
      background: var(--success);
      border-radius: 50%;
      margin-right: 6px;
      animation: pulse 1.5s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: .5; transform: scale(1.3); }
    }

    /* ── LOGIN ── */
    #login-view {
      max-width: 420px;
      margin: 60px auto 0;
    }
    #login-view h1 {
      font-size: clamp(1.6rem, 4vw, 2rem);
      font-weight: 700;
      margin-bottom: 8px;
      color: var(--accent);
    }
    #login-view .subtitle {
      color: var(--muted);
      margin-bottom: 32px;
      font-size: .95rem;
    }
    #login-view .divider {
      text-align: center;
      color: var(--muted);
      font-size: .85rem;
      margin: 20px 0;
      position: relative;
    }
    #login-view .divider::before, #login-view .divider::after {
      content: '';
      position: absolute;
      top: 50%;
      width: 42%;
      height: 1px;
      background: var(--bg3);
    }
    #login-view .divider::before { left: 0; }
    #login-view .divider::after { right: 0; }

    /* ── DASHBOARD ── */
    .project-list { display: flex; flex-direction: column; gap: 10px; }
    .project-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--bg3);
      border-radius: var(--radius);
      padding: 14px 18px;
      border: 1px solid #475569;
      gap: 12px;
    }
    .project-item .proj-info { flex: 1; min-width: 0; }
    .project-item .proj-name {
      font-weight: 600;
      font-size: .95rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .project-item .proj-meta {
      font-size: .8rem;
      color: var(--muted);
      margin-top: 2px;
    }
    .project-item .proj-actions { display: flex; gap: 8px; flex-shrink: 0; }

    /* ── QUIZ LAYOUT ── */
    .quiz-layout {
      display: grid;
      grid-template-columns: 1fr 340px;
      gap: 24px;
      align-items: start;
    }
    @media (max-width: 768px) {
      .quiz-layout { grid-template-columns: 1fr; }
    }

    /* ── OPPGAVE (question) ── */
    .oppgave-card {
      background: var(--bg2);
      border: 1px solid var(--bg3);
      border-radius: var(--radius-card);
      padding: 32px;
    }
    .oppgave-number {
      font-size: .85rem;
      color: var(--muted);
      margin-bottom: 8px;
    }
    .oppgave-blokk { margin-bottom: 20px; }
    .oppgave-blokk:last-child { margin-bottom: 0; }
    .blokk-tekst {
      font-size: clamp(1.1rem, 3vw, 1.4rem);
      line-height: 1.6;
      text-align: center;
      color: var(--text);
      padding: 8px 0;
    }

    /* ── BILDEGRID ── */
    .bildegrid { gap: 8px; display: grid; }
    .bildegrid img {
      width: 100%;
      border-radius: var(--radius);
      display: block;
    }
    .bildegrid.count-1 {
      grid-template-columns: 1fr;
      justify-items: center;
    }
    .bildegrid.count-1 img {
      max-width: 600px;
      max-height: 500px;
      object-fit: contain;
    }
    .bildegrid.count-2 {
      grid-template-columns: 1fr 1fr;
    }
    .bildegrid.count-2 img {
      aspect-ratio: 4/3;
      object-fit: cover;
    }
    .bildegrid.count-3 {
      grid-template-columns: 1fr 1fr;
    }
    .bildegrid.count-3 img {
      aspect-ratio: 4/3;
      object-fit: cover;
    }
    .bildegrid.count-3 img:nth-child(3) {
      grid-column: 1 / -1;
      max-height: 300px;
      object-fit: cover;
    }
    .bildegrid.count-4 {
      grid-template-columns: 1fr 1fr;
    }
    .bildegrid.count-4 img {
      aspect-ratio: 4/3;
      object-fit: cover;
    }
    .bildegrid.count-5, .bildegrid.count-6 {
      grid-template-columns: 1fr 1fr 1fr;
    }
    .bildegrid.count-5 img, .bildegrid.count-6 img {
      aspect-ratio: 4/3;
      object-fit: cover;
    }

    /* ── ANSWERS PANEL ── */
    .answers-panel {
      background: var(--bg2);
      border: 1px solid var(--bg3);
      border-radius: var(--radius-card);
      padding: 20px;
      position: sticky;
      top: 76px;
      max-height: calc(100vh - 100px);
      display: flex;
      flex-direction: column;
    }
    .answers-panel h3 {
      font-size: 1rem;
      font-weight: 600;
      margin-bottom: 14px;
      display: flex;
      align-items: center;
    }
    .answers-list {
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 8px;
      padding-right: 4px;
    }
    .answers-list::-webkit-scrollbar { width: 4px; }
    .answers-list::-webkit-scrollbar-track { background: var(--bg3); border-radius: 2px; }
    .answers-list::-webkit-scrollbar-thumb { background: var(--muted); border-radius: 2px; }
    .svar-item {
      background: var(--bg3);
      border-radius: var(--radius);
      padding: 10px 14px;
      border-left: 3px solid var(--accent);
    }
    .svar-navn {
      font-size: .85rem;
      color: var(--accent);
      font-weight: 600;
      margin-bottom: 3px;
    }
    .svar-tekst { font-size: .9rem; color: var(--text); line-height: 1.4; }
    .svar-tid { font-size: .75rem; color: var(--muted); margin-top: 4px; }
    .no-answers {
      text-align: center;
      color: var(--muted);
      font-size: .9rem;
      padding: 24px 0;
    }

    /* ── PARTICIPANT ── */
    .waiting-screen {
      text-align: center;
      padding: 80px 20px;
    }
    .waiting-screen .big-icon {
      font-size: 4rem;
      margin-bottom: 20px;
    }
    .waiting-screen h2 {
      font-size: clamp(1.4rem, 4vw, 1.8rem);
      margin-bottom: 12px;
    }
    .waiting-screen p { color: var(--muted); font-size: 1rem; }

    .answer-form-wrap {
      background: var(--bg2);
      border: 1px solid var(--bg3);
      border-radius: var(--radius-card);
      padding: 24px;
      margin-top: 20px;
    }
    .answer-form-wrap h3 {
      font-size: 1rem;
      font-weight: 600;
      margin-bottom: 16px;
    }
    .sent-badge {
      display: flex;
      align-items: center;
      gap: 10px;
      background: rgba(34, 197, 94, .1);
      border: 1px solid rgba(34, 197, 94, .3);
      border-radius: var(--radius);
      padding: 14px 18px;
      color: var(--success);
      font-weight: 600;
      font-size: 1rem;
      margin-top: 20px;
    }

    /* ── NAV BUTTONS ── */
    .quiz-nav {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-top: 20px;
      flex-wrap: wrap;
    }

    /* ── SETTINGS ── */
    .settings-row {
      display: flex;
      gap: 12px;
      align-items: flex-end;
      flex-wrap: wrap;
    }
    .settings-row .form-group { flex: 1; min-width: 200px; margin-bottom: 0; }

    /* ── BADGE ── */
    .badge {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 99px;
      font-size: .75rem;
      font-weight: 600;
    }
    .badge-active  { background: rgba(34,197,94,.15); color: var(--success); }
    .badge-inactive { background: var(--bg3); color: var(--muted); }

    /* ── IMPORT AREA ── */
    .import-drop {
      border: 2px dashed var(--bg3);
      border-radius: var(--radius);
      padding: 32px;
      text-align: center;
      color: var(--muted);
      cursor: pointer;
      transition: border-color .15s, color .15s;
      font-size: .9rem;
    }
    .import-drop:hover, .import-drop.drag-over {
      border-color: var(--accent);
      color: var(--accent);
    }

    /* ── UTILITIES ── */
    .flex-row { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
    .mt8  { margin-top: 8px; }
    .mt16 { margin-top: 16px; }
    .mt24 { margin-top: 24px; }
    .text-muted { color: var(--muted); }
    .text-accent { color: var(--accent); }
    .text-danger { color: var(--danger); }
    .text-success { color: var(--success); }
    .text-center { text-align: center; }
    .w100 { width: 100%; }
    .section-title {
      font-size: .75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--muted);
      margin-bottom: 12px;
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 480px) {
      #app { padding: 20px 14px 48px; }
      .card { padding: 18px; }
      .oppgave-card { padding: 20px; }
    }
  </style>
</head>
<body>

<nav id="navbar">
  <a class="brand" href="#" onclick="handleBrandClick(event)">⚡ WebQuiz</a>
  <div class="nav-right" id="nav-right"></div>
</nav>

<div id="app"></div>
<div id="toast"></div>

<script>
/* ═══════════════════════════════════════
   CONFIG
═══════════════════════════════════════ */
const REPO_OWNER = 'frydenlundsin';
const REPO_NAME  = 'WebQuiz';
const BRANCH     = 'main';
const ADMIN_PASS = 'quiz2026';
const POLL_MS    = 3000;

const API_BASE   = `https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents`;

/* ═══════════════════════════════════════
   STATE
═══════════════════════════════════════ */
let pollTimer     = null;
let fileShas      = {};   // filename → sha
let lastRenderKey = null;

/* ═══════════════════════════════════════
   UTILITIES
═══════════════════════════════════════ */
function escapeHtml(str) {
  if (str == null) return '';
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

function b64encode(str) {
  return btoa(unescape(encodeURIComponent(str)));
}

function b64decode(b64) {
  return decodeURIComponent(escape(atob(b64.replace(/\s/g, ''))));
}

function toast(msg, type = 'info') {
  const container = document.getElementById('toast');
  const el = document.createElement('div');
  el.className = `toast-item ${type === 'error' ? 'error' : type === 'success' ? 'success' : ''}`;
  el.textContent = msg;
  container.appendChild(el);
  setTimeout(() => { el.remove(); }, 4000);
}

function stopPoll() {
  if (pollTimer) { clearInterval(pollTimer); pollTimer = null; }
}

function fmtTime(iso) {
  try {
    const d = new Date(iso);
    return d.toLocaleTimeString('no-NO', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
  } catch { return iso || ''; }
}

function setApp(html) {
  document.getElementById('app').innerHTML = html;
}

function setNav(html) {
  document.getElementById('nav-right').innerHTML = html;
}

/* ═══════════════════════════════════════
   GITHUB API
═══════════════════════════════════════ */
async function ghRead(filename, token) {
  const headers = { 'Accept': 'application/vnd.github.v3+json' };
  if (token) headers['Authorization'] = `token ${token}`;

  try {
    const res = await fetch(`${API_BASE}/${filename}?ref=${BRANCH}&t=${Date.now()}`, { headers });
    if (res.status === 404) return null;
    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      throw new Error(err.message || `HTTP ${res.status}`);
    }
    const data = await res.json();
    fileShas[filename] = data.sha;
    return JSON.parse(b64decode(data.content));
  } catch (e) {
    if (e.message && e.message.includes('404')) return null;
    throw e;
  }
}

async function ghWrite(filename, content, token) {
  const headers = {
    'Accept': 'application/vnd.github.v3+json',
    'Authorization': `token ${token}`,
    'Content-Type': 'application/json'
  };

  const body = {
    message: `Update ${filename}`,
    content: b64encode(JSON.stringify(content, null, 2)),
    branch: BRANCH
  };

  if (fileShas[filename]) {
    body.sha = fileShas[filename];
  }

  const res = await fetch(`${API_BASE}/${filename}`, {
    method: 'PUT',
    headers,
    body: JSON.stringify(body)
  });

  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    const e = new Error(err.message || `HTTP ${res.status}`);
    e.status = res.status;
    throw e;
  }

  const data = await res.json();
  if (data.content && data.content.sha) {
    fileShas[filename] = data.content.sha;
  }
  return data;
}

/* Retry ghWrite on 409 conflict by re-reading SHA first */
async function ghWriteWithRetry(filename, content, token, maxRetries = 3) {
  for (let i = 0; i < maxRetries; i++) {
    try {
      return await ghWrite(filename, content, token);
    } catch (e) {
      if (e.status === 409 && i < maxRetries - 1) {
        await new Promise(r => setTimeout(r, 500 * (i + 1)));
        // Re-read to get fresh SHA
        await ghRead(filename, token);
      } else {
        throw e;
      }
    }
  }
}

/* ═══════════════════════════════════════
   ENSURE FILES (admin init)
═══════════════════════════════════════ */
async function ensureFiles(pat) {
  const initialState = {
    aktiv: false,
    prosjekt: null,
    oppgaveIndex: 0,
    deltagerToken: '',
    svar: []
  };
  const initialProjects = [];

  try {
    const s = await ghRead('state.json', pat);
    if (s === null) {
      await ghWrite('state.json', initialState, pat);
      toast('state.json opprettet', 'success');
    }
  } catch (e) {
    toast('Feil ved oppretting av state.json: ' + e.message, 'error');
  }

  try {
    const p = await ghRead('projects.json', pat);
    if (p === null) {
      await ghWrite('projects.json', initialProjects, pat);
      toast('projects.json opprettet', 'success');
    }
  } catch (e) {
    toast('Feil ved oppretting av projects.json: ' + e.message, 'error');
  }
}

/* ═══════════════════════════════════════
   RENDER BLOKKER
═══════════════════════════════════════ */
function renderOppgaveBlokker(oppgave) {
  if (!oppgave || !Array.isArray(oppgave.blokker)) return '';
  return oppgave.blokker.map(blokk => {
    if (blokk.type === 'tekst') {
      return `<div class="oppgave-blokk blokk-tekst">${escapeHtml(blokk.innhold)}</div>`;
    }
    if (blokk.type === 'bildegrid') {
      const imgs = Array.isArray(blokk.bilder) ? blokk.bilder : [];
      const cnt  = Math.min(imgs.length, 6);
      const imgTags = imgs.slice(0, 6).map(url =>
        `<img src="${escapeHtml(url)}" alt="" loading="lazy" />`
      ).join('');
      return `<div class="oppgave-blokk"><div class="bildegrid count-${cnt}">${imgTags}</div></div>`;
    }
    return '';
  }).join('');
}

/* ═══════════════════════════════════════
   NAV BAR BRAND CLICK
═══════════════════════════════════════ */
function handleBrandClick(e) {
  e.preventDefault();
  const role = sessionStorage.getItem('quiz_role');
  if (role === 'admin') showAdminDashboard();
  else showParticipant();
}

/* ═══════════════════════════════════════
   VIEW: LOGIN
═══════════════════════════════════════ */
function showLogin() {
  stopPoll();
  setNav('');
  setApp(`
    <div id="login-view">
      <h1>⚡ WebQuiz</h1>
      <p class="subtitle">Administrasjonspanel for live quiz-sesjoner</p>

      <div class="card">
        <h2>Admin-innlogging</h2>
        <div class="form-group">
          <label>Passord</label>
          <input type="password" id="inp-pass" placeholder="Quiz-passord" autocomplete="current-password" />
        </div>
        <div class="form-group">
          <label>GitHub PAT (Personal Access Token)</label>
          <input type="password" id="inp-pat" placeholder="ghp_..." autocomplete="off" />
        </div>
        <button class="btn btn-primary w100 mt8" onclick="doAdminLogin()">
          Logg inn som admin
        </button>
        <div id="login-err" class="text-danger mt8" style="font-size:.85rem;min-height:20px;"></div>
      </div>
    </div>
  `);

  // Focus password field
  setTimeout(() => {
    const el = document.getElementById('inp-pass');
    if (el) el.focus();
  }, 50);

  // Enter key support
  setTimeout(() => {
    document.getElementById('inp-pass')?.addEventListener('keydown', e => { if (e.key === 'Enter') document.getElementById('inp-pat')?.focus(); });
    document.getElementById('inp-pat')?.addEventListener('keydown', e => { if (e.key === 'Enter') doAdminLogin(); });
  }, 60);
}

async function doAdminLogin() {
  const pass = document.getElementById('inp-pass')?.value.trim();
  const pat  = document.getElementById('inp-pat')?.value.trim();
  const errEl = document.getElementById('login-err');

  if (pass !== ADMIN_PASS) {
    errEl.textContent = 'Feil passord.';
    return;
  }
  if (!pat) {
    errEl.textContent = 'PAT er påkrevd.';
    return;
  }

  errEl.textContent = '';
  errEl.innerHTML = '<span class="spinner"></span> Verifiserer PAT...';

  // Verify PAT against GitHub API
  try {
    const res = await fetch(`https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}`, {
      headers: { 'Authorization': `token ${pat}` }
    });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const repoData = await res.json();

    sessionStorage.setItem('quiz_pat', pat);
    sessionStorage.setItem('quiz_role', 'admin');

    toast(`Logget inn — ${repoData.full_name}`, 'success');
    await ensureFiles(pat);
    showAdminDashboard();
  } catch (e) {
    errEl.textContent = 'Ugyldig PAT: ' + e.message;
  }
}

function getUrlParam(name) {
  return new URLSearchParams(window.location.search).get(name) || '';
}

/* ═══════════════════════════════════════
   VIEW: ADMIN DASHBOARD
═══════════════════════════════════════ */
async function showAdminDashboard() {
  stopPoll();
  const pat = sessionStorage.getItem('quiz_pat');

  setNav(`
    <span class="text-muted" style="font-size:.85rem;">Admin</span>
    <button onclick="doLogout()">Logg ut</button>
  `);

  setApp(`
    <div style="text-align:center;padding:60px 0;">
      <span class="spinner"></span>
      <p class="text-muted mt16">Laster...</p>
    </div>
  `);

  let state, projects;
  try {
    [state, projects] = await Promise.all([
      ghRead('state.json', pat),
      ghRead('projects.json', pat)
    ]);
  } catch (e) {
    toast('Klarte ikke laste data: ' + e.message, 'error');
    setApp(`<p class="text-danger text-center mt24">Feil: ${escapeHtml(e.message)}</p>`);
    return;
  }

  state    = state    || { aktiv: false, prosjekt: null, oppgaveIndex: 0, deltagerToken: '', svar: [] };
  projects = projects || [];

  const isActive    = state.aktiv;
  const activeProj  = state.prosjekt;

  const projectsHtml = projects.length === 0
    ? `<p class="text-muted text-center" style="padding:24px 0;">Ingen prosjekter. Importer et prosjekt for å starte.</p>`
    : projects.map((p, i) => `
        <div class="project-item">
          <div class="proj-info">
            <div class="proj-name">${escapeHtml(p.navn || p.name || 'Ukjent')}</div>
            <div class="proj-meta">${Array.isArray(p.oppgaver) ? p.oppgaver.length : 0} oppgaver</div>
          </div>
          <div class="proj-actions">
            ${isActive && activeProj && (activeProj.navn || activeProj.name) === (p.navn || p.name)
              ? `<span class="badge badge-active">Aktiv</span>`
              : `<button class="btn btn-sm btn-primary" onclick="startProject(${i})">Start</button>`
            }
            <button class="btn btn-sm btn-danger" onclick="deleteProject(${i})">Slett</button>
          </div>
        </div>
      `).join('');

  setApp(`
    ${isActive ? `
      <div class="card" style="border-color:rgba(34,197,94,.4);background:rgba(34,197,94,.05);">
        <div class="flex-row">
          <span class="live-dot"></span>
          <strong>Quiz er aktiv:</strong>
          <span class="text-accent">${escapeHtml((activeProj && (activeProj.navn || activeProj.name)) || 'Ukjent prosjekt')}</span>
          <span class="text-muted">· Spørsmål ${(state.oppgaveIndex || 0) + 1}</span>
          <button class="btn btn-primary btn-sm" onclick="showAdminQuiz()" style="margin-left:auto;">
            Gå til quiz →
          </button>
        </div>
      </div>
    ` : ''}

    <div class="card">
      <div class="flex-row" style="margin-bottom:18px;">
        <h2 style="margin:0;">Prosjekter</h2>
        <button class="btn btn-secondary btn-sm" onclick="showImportModal()" style="margin-left:auto;">
          + Importer JSON
        </button>
      </div>
      <div class="project-list">${projectsHtml}</div>
    </div>

    <div class="card">
      <h2>Del quiz-lenken</h2>
      <p class="text-muted" style="font-size:.9rem;margin-bottom:10px;">Del denne URL-en med deltakere:</p>
      <code style="display:block;background:var(--bg3);padding:10px 14px;border-radius:var(--radius);font-size:.9rem;">
        ${window.location.origin}${window.location.pathname}
      </code>
    </div>

    <!-- Import modal (hidden) -->
    <div id="import-modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;align-items:center;justify-content:center;">
      <div class="card" style="width:min(600px,95vw);max-height:80vh;overflow-y:auto;position:relative;">
        <h2>Importer prosjekt (JSON)</h2>
        <p class="text-muted" style="font-size:.85rem;margin-bottom:16px;">
          Lim inn JSON eller slipp en fil. Format: <code style="background:var(--bg3);padding:2px 5px;border-radius:4px;">{"navn":"...", "oppgaver":[...]}</code>
        </p>
        <div class="import-drop" id="import-drop" onclick="document.getElementById('import-file').click()">
          Klikk her eller dra-og-slipp en .json-fil
          <input type="file" id="import-file" accept=".json,application/json" style="display:none" onchange="handleImportFile(event)" />
        </div>
        <div class="form-group mt16">
          <label>Eller lim inn JSON direkte</label>
          <textarea id="import-json" rows="8" placeholder='{"navn": "Prosjektnavn", "oppgaver": [...]}'></textarea>
        </div>
        <div class="flex-row mt16">
          <button class="btn btn-primary" onclick="doImport()">Importer</button>
          <button class="btn btn-secondary" onclick="hideImportModal()">Avbryt</button>
        </div>
      </div>
    </div>
  `);

  // Drag-and-drop for import
  setTimeout(() => {
    const drop = document.getElementById('import-drop');
    if (!drop) return;
    drop.addEventListener('dragover', e => { e.preventDefault(); drop.classList.add('drag-over'); });
    drop.addEventListener('dragleave', () => drop.classList.remove('drag-over'));
    drop.addEventListener('drop', e => {
      e.preventDefault();
      drop.classList.remove('drag-over');
      const file = e.dataTransfer.files[0];
      if (file) readImportFile(file);
    });
  }, 100);
}

function showImportModal() {
  const m = document.getElementById('import-modal');
  if (m) m.style.display = 'flex';
}

function hideImportModal() {
  const m = document.getElementById('import-modal');
  if (m) m.style.display = 'none';
}

function handleImportFile(event) {
  const file = event.target.files[0];
  if (file) readImportFile(file);
}

function readImportFile(file) {
  const reader = new FileReader();
  reader.onload = e => {
    const ta = document.getElementById('import-json');
    if (ta) ta.value = e.target.result;
  };
  reader.readAsText(file);
}

async function doImport() {
  const raw = document.getElementById('import-json')?.value.trim();
  if (!raw) { toast('Ingen JSON å importere', 'error'); return; }

  let proj;
  try { proj = JSON.parse(raw); }
  catch (e) { toast('Ugyldig JSON: ' + e.message, 'error'); return; }

  if (!proj.navn && !proj.name) { toast('Prosjektet mangler "navn"-felt', 'error'); return; }
  if (!Array.isArray(proj.oppgaver)) { toast('Prosjektet mangler "oppgaver"-array', 'error'); return; }

  const pat = sessionStorage.getItem('quiz_pat');
  try {
    const projects = (await ghRead('projects.json', pat)) || [];
    projects.push(proj);
    await ghWrite('projects.json', projects, pat);
    toast(`Prosjekt "${proj.navn || proj.name}" importert!`, 'success');
    hideImportModal();
    showAdminDashboard();
  } catch (e) {
    toast('Feil ved lagring: ' + e.message, 'error');
  }
}

async function deleteProject(idx) {
  if (!confirm('Slett dette prosjektet?')) return;
  const pat = sessionStorage.getItem('quiz_pat');
  try {
    const projects = (await ghRead('projects.json', pat)) || [];
    projects.splice(idx, 1);
    await ghWrite('projects.json', projects, pat);
    toast('Prosjekt slettet', 'success');
    showAdminDashboard();
  } catch (e) {
    toast('Feil: ' + e.message, 'error');
  }
}

async function startProject(idx) {
  const pat = sessionStorage.getItem('quiz_pat');
  try {
    const [state, projects] = await Promise.all([
      ghRead('state.json', pat),
      ghRead('projects.json', pat)
    ]);
    const proj = projects[idx];
    const newState = {
      ...(state || {}),
      aktiv: true,
      prosjekt: proj,
      oppgaveIndex: 0,
      svar: []
    };
    await ghWrite('state.json', newState, pat);
    toast(`Startet "${proj.navn || proj.name}"`, 'success');
    showAdminQuiz();
  } catch (e) {
    toast('Feil: ' + e.message, 'error');
  }
}


/* ═══════════════════════════════════════
   VIEW: ADMIN QUIZ
═══════════════════════════════════════ */
async function showAdminQuiz() {
  stopPoll();
  const pat = sessionStorage.getItem('quiz_pat');

  setNav(`
    <span class="text-muted" style="font-size:.85rem;">Admin · Quiz</span>
    <button onclick="showAdminDashboard()">← Dashboard</button>
    <button onclick="doLogout()">Logg ut</button>
  `);

  setApp(`<div style="text-align:center;padding:60px 0;"><span class="spinner"></span></div>`);

  let state;
  try { state = await ghRead('state.json', pat); }
  catch (e) { toast('Feil: ' + e.message, 'error'); return; }

  if (!state || !state.aktiv || !state.prosjekt) {
    toast('Ingen aktiv quiz', 'error');
    showAdminDashboard();
    return;
  }

  renderAdminQuiz(state);

  // Poll
  pollTimer = setInterval(async () => {
    try {
      const fresh = await ghRead('state.json', pat);
      if (fresh) renderAdminQuiz(fresh);
    } catch {}
  }, POLL_MS);
}

function renderAdminQuiz(state) {
  const proj     = state.prosjekt;
  const oppgaver = Array.isArray(proj.oppgaver) ? proj.oppgaver : [];
  const idx      = state.oppgaveIndex || 0;
  const oppgave  = oppgaver[idx];
  const total    = oppgaver.length;

  const blokkerHtml = oppgave ? renderOppgaveBlokker(oppgave) : '<p class="text-muted text-center">Ingen oppgave</p>';
  const progressPct = total > 1 ? (idx / (total - 1)) * 100 : 100;

  document.getElementById('app').innerHTML = `
    <div class="flex-row" style="margin-bottom:16px;flex-wrap:wrap;gap:10px;">
      <div>
        <span class="live-dot"></span>
        <strong>${escapeHtml(proj.navn || proj.name)}</strong>
        <span class="text-muted" style="margin-left:8px;">· Spørsmål ${idx + 1} av ${total}</span>
      </div>
      <div style="margin-left:auto;">
        <button class="btn btn-sm btn-danger" onclick="avsluttQuiz()">Avslutt quiz</button>
      </div>
    </div>

    <div class="progress-wrap">
      <div class="progress-bar" style="width:${progressPct}%"></div>
    </div>

    <div class="oppgave-card">${blokkerHtml}</div>

    <div class="quiz-nav">
      <button class="btn btn-secondary" onclick="adminNav(-1)" ${idx === 0 ? 'disabled' : ''}>← Forrige</button>
      <button class="btn btn-primary" onclick="adminNav(1)" ${idx >= total - 1 ? 'disabled' : ''}>Neste →</button>
      ${idx >= total - 1 ? `<button class="btn btn-success" onclick="avsluttQuiz()">Fullfør quiz ✓</button>` : ''}
    </div>
  `;
}

async function adminNav(delta) {
  const pat = sessionStorage.getItem('quiz_pat');
  try {
    const state = await ghRead('state.json', pat);
    const total = Array.isArray(state.prosjekt?.oppgaver) ? state.prosjekt.oppgaver.length : 1;
    const newIdx = Math.max(0, Math.min(total - 1, (state.oppgaveIndex || 0) + delta));
    state.oppgaveIndex = newIdx;
    await ghWrite('state.json', state, pat);
    renderAdminQuiz(state);
  } catch (e) {
    toast('Feil: ' + e.message, 'error');
  }
}


async function avsluttQuiz() {
  if (!confirm('Avslutt quizen? Svar beholdes.')) return;
  const pat = sessionStorage.getItem('quiz_pat');
  try {
    const state = await ghRead('state.json', pat);
    state.aktiv = false;
    await ghWrite('state.json', state, pat);
    toast('Quiz avsluttet', 'success');
    stopPoll();
    showAdminDashboard();
  } catch (e) {
    toast('Feil: ' + e.message, 'error');
  }
}

/* ═══════════════════════════════════════
   VIEW: PARTICIPANT
═══════════════════════════════════════ */
function showParticipant() {
  stopPoll();
  sessionStorage.setItem('quiz_role', 'participant');

  setNav(`<a class="nav-link" href="?admin" style="opacity:.4;font-size:.8rem;">Admin</a>`);

  setApp(`
    <div class="waiting-screen">
      <div class="big-icon">⏳</div>
      <h2>Kobler til quiz...</h2>
      <p><span class="spinner"></span></p>
    </div>
  `);

  lastRenderKey = null;

  // Immediate first poll, then repeat
  pollParticipant();
  pollTimer = setInterval(pollParticipant, POLL_MS);
}

async function pollParticipant() {
  let state;
  try {
    state = await ghRead('state.json', null);
    if (!state) { renderWaiting('Venter på quiz...'); return; }
  } catch (e) {
    return; // silently ignore poll errors
  }

  if (!state.aktiv) {
    if (lastRenderKey !== 'waiting') {
      lastRenderKey = 'waiting';
      renderWaiting('Quizen er ikke aktiv ennå. Venter...');
    }
    return;
  }

  const idx     = state.oppgaveIndex || 0;
  const renderKey = `${idx}`;
  if (lastRenderKey === renderKey) return;
  lastRenderKey = renderKey;

  renderParticipantOppgave(state, idx);
}

function renderWaiting(msg) {
  document.getElementById('app').innerHTML = `
    <div class="waiting-screen">
      <div class="big-icon">🎯</div>
      <h2>Venter på quiz</h2>
      <p>${escapeHtml(msg)}</p>
      <p class="text-muted mt16" style="font-size:.85rem;">Siden oppdateres automatisk</p>
    </div>
  `;
}

function renderParticipantOppgave(state, idx) {
  const proj    = state.prosjekt;
  const oppgave = (proj && Array.isArray(proj.oppgaver)) ? proj.oppgaver[idx] : null;
  const total   = (proj && Array.isArray(proj.oppgaver)) ? proj.oppgaver.length : 1;
  const progressPct  = total > 1 ? (idx / (total - 1)) * 100 : 100;
  const blokkerHtml  = oppgave ? renderOppgaveBlokker(oppgave) : '<p class="text-muted text-center">Ingen oppgave</p>';

  document.getElementById('app').innerHTML = `
    <div style="max-width:720px;margin:0 auto;">
      <div class="flex-row" style="margin-bottom:12px;">
        <span class="text-muted" style="font-size:.85rem;">
          ${escapeHtml((proj?.navn || proj?.name) || 'Quiz')} · Spørsmål ${idx + 1} av ${total}
        </span>
      </div>
      <div class="progress-wrap">
        <div class="progress-bar" style="width:${progressPct}%"></div>
      </div>
      <div class="oppgave-card">${blokkerHtml}</div>
    </div>
  `;
}


/* ═══════════════════════════════════════
   LOGOUT
═══════════════════════════════════════ */
function doLogout() {
  stopPoll();
  sessionStorage.removeItem('quiz_pat');
  sessionStorage.removeItem('quiz_role');
  window.location.href = window.location.pathname;
}

/* ═══════════════════════════════════════
   INIT
═══════════════════════════════════════ */
async function init() {
  const pat        = sessionStorage.getItem('quiz_pat');
  const isAdminUrl = window.location.search.includes('admin');

  if (isAdminUrl && !(sessionStorage.getItem('quiz_role') === 'admin' && pat)) {
    showLogin();
  } else if (sessionStorage.getItem('quiz_role') === 'admin' && pat) {
    showAdminDashboard();
  } else {
    showParticipant();
  }
}

init();
</script>
